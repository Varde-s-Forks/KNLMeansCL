name: Build for Windows

on: [push, pull_request]

jobs:
  build:
    runs-on: windows-latest
    env:
      VCPKG_INSTALLATION_ROOT: C:\vcpkg

    steps:
      - uses: actions/checkout@v6

      # MSVC must be set up before vcpkg so any from-source compilation uses the right toolchain.
      - name: Setup MSVC dev environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Setup uv
        uses: astral-sh/setup-uv@v8.0.0

      - name: Cache vcpkg packages
        uses: actions/cache@v5
        with:
          path: |
            ${{ env.VCPKG_INSTALLATION_ROOT }}\installed
            ${{ env.VCPKG_INSTALLATION_ROOT }}\downloads
          key: ${{ runner.os }}-vcpkg-x64-${{ hashFiles('.github/workflows/*.yml') }}
          restore-keys: ${{ runner.os }}-vcpkg-x64-

      # Install all native deps via the pre-installed vcpkg
      # If cached, vcpkg will see them as already installed and finish almost instantly.
      - name: Install vcpkg packages
        shell: pwsh
        run: |
          vcpkg install `
            opencl:x64-windows `
            boost-filesystem:x64-windows-static `
            boost-system:x64-windows-static `
            pkgconf:x64-windows

          # Expose pkgconf as pkg-config on PATH
          $toolsDir = "$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows\tools\pkgconf"
          if (Test-Path "$toolsDir\pkgconf.exe") {
            Copy-Item "$toolsDir\pkgconf.exe" "$toolsDir\pkg-config.exe" -Force
          }
          "$toolsDir" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        env:
          VCPKG_ROOT: ${{ env.VCPKG_INSTALLATION_ROOT }}

      # Extend MSVC's LIB/INCLUDE (set by ilammy/msvc-dev-cmd) to include vcpkg dirs.
      - name: Meson setup
        shell: pwsh
        run: |
          $vcpkgInstalled = "$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows"
          $vcpkgStatic = "$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows-static"

          $env:LIB = "$vcpkgInstalled\lib;$vcpkgStatic\lib;$env:LIB"
          $env:INCLUDE = "$vcpkgInstalled\include;$env:INCLUDE"
          $env:PKG_CONFIG_PATH = "$vcpkgInstalled\lib\pkgconfig;$vcpkgStatic\lib\pkgconfig"
          $env:BOOST_ROOT = "$vcpkgStatic"
          $env:MESON_ARGS = "-Db_vscrt=mt -Denable_avs=false -Dstatic=true"
          uv build --wheel

      - name: Upload VapourSynth plugin
        uses: actions/upload-artifact@v7
        with:
          name: knlmeanscl-vs-windows-x64
          path: dist/*
