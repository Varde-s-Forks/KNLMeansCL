name: Build for Windows

on:
  workflow_call:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    env:
      VCPKG_INSTALLATION_ROOT: C:\vcpkg

    steps:
      - uses: actions/checkout@v6

      # MSVC must be set up before vcpkg so any from-source compilation uses the right toolchain.
      - name: Setup MSVC dev environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Setup uv
        uses: astral-sh/setup-uv@v8.0.0

      - name: Cache vcpkg packages
        uses: actions/cache@v5
        with:
          path: vcpkg_installed
          key: ${{ runner.os }}-vcpkg-x64-${{ hashFiles('vcpkg.json') }}
          restore-keys: ${{ runner.os }}-vcpkg-x64-

      - name: Install vcpkg packages
        shell: pwsh
        run: |
          vcpkg install `
            --triplet x64-windows-static `
            --x-install-root=vcpkg_installed

          # Expose pkgconf as pkg-config on PATH
          $toolsDir = "${{ github.workspace }}\vcpkg_installed\x64-windows-static\tools\pkgconf"
          if (Test-Path "$toolsDir\pkgconf.exe") {
            if (-not (Test-Path "$toolsDir\pkg-config.exe")) {
              Copy-Item "$toolsDir\pkgconf.exe" "$toolsDir\pkg-config.exe" -Force
            }
          }
          "$toolsDir" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        env:
          VCPKG_ROOT: ${{ env.VCPKG_INSTALLATION_ROOT }}

      - name: Meson setup and build
        shell: pwsh
        run: |
          $vcpkgRoot = "${{ github.workspace }}\vcpkg_installed\x64-windows-static"
          $env:LIB = "$vcpkgRoot\lib;$env:LIB"
          $env:INCLUDE = "$vcpkgRoot\include;$env:INCLUDE"
          $env:PKG_CONFIG_PATH = "$vcpkgRoot\lib\pkgconfig"
          $env:BOOST_ROOT = "$vcpkgRoot"
          $env:MESON_ARGS = "-Db_vscrt=mt -Denable_avs=false -Dstatic=true"
          uv build --wheel

      - name: Cache Intel OpenCL CPU Runtime
        id: cache-ocl
        uses: actions/cache@v5
        with:
          path: C:\Program Files (x86)\Common Files\Intel
          key: ${{ runner.os }}-intel-opencl-2025.3.1.762

      - name: Install Intel OpenCL CPU Runtime
        if: steps.cache-ocl.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $installer = "${{ runner.temp }}\ocl_runtime.exe"
          curl.exe -L "https://registrationcenter-download.intel.com/akdlm/IRC_NAS/ad824c04-01c8-4ae5-b5e8-164a04f67609/w_opencl_runtime_p_2025.3.1.762.exe" `
            --output $installer

          # Extract the MSI from the wrapper
          $extractDir = "${{ runner.temp }}\ocl_ext"
          Start-Process -FilePath $installer `
            -ArgumentList "--silent", "--extract-folder", "$extractDir", "--extract-only" `
            -Wait

          # Find and install the MSI silently
          $msi = Get-ChildItem -Path $extractDir -Filter "*.msi" -Recurse | Select-Object -First 1
          if ($msi) {
            Write-Host "Installing MSI: $($msi.FullName)"
            Start-Process -FilePath "msiexec.exe" -ArgumentList "/i", "`"$($msi.FullName)`"", "/qn", "/norestart" -Wait
          } else {
            Write-Error "MSI not found in extracted files."
            exit 1
          }

      - name: Install and run tests
        shell: pwsh
        run: |
          $dll = Get-ChildItem -Path "C:\Program Files (x86)\Common Files\Intel" -Filter "intelocl64.dll" -Recurse | Select-Object -First 1
          if ($dll) {
            $env:OCL_ICD_FILENAMES = $dll.FullName
            Write-Host "Using OpenCL ICD: $env:OCL_ICD_FILENAMES"
          } else {
            Write-Warning "Intel OpenCL ICD not found. Tests may fail if no other OpenCL runtime is present."
          }

          uv sync --no-install-project
          $wheel = Get-ChildItem dist/*.whl | Select-Object -First 1
          uv pip install $wheel.FullName
          uv run --no-sync pytest -v tests

      - name: Upload VapourSynth plugin
        uses: actions/upload-artifact@v7
        with:
          name: knlmeanscl-vs-windows-x64
          path: dist/*
