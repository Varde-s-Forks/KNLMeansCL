name: Build for macOS

on:
  workflow_call:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: macosx_x86_64
            runs-on: macos-15-intel
          - arch: macosx_arm64
            runs-on: macos-15
    runs-on: ${{ matrix.runs-on }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup uv
        uses: astral-sh/setup-uv@v8.0.0

      - name: Cache vcpkg packages
        uses: actions/cache@v5
        with:
          path: |
            vcpkg_installed
          key: ${{ runner.os }}-vcpkg-${{ matrix.arch }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: ${{ runner.os }}-vcpkg-${{ matrix.arch }}-

      - name: Install vcpkg packages
        run: |
          vcpkg install \
            --triplet ${{ matrix.arch == 'macosx_arm64' && 'arm64' || 'x64' }}-osx \
            --x-install-root=vcpkg_installed
        env:
          VCPKG_ROOT: /usr/local/share/vcpkg

      - name: Install OpenCL Runtime (PoCL)
        run: |
          brew install pocl clinfo
          
          # Find pocl.icd
          POCL_ICD_FILE=$(find $(brew --prefix pocl) -name "pocl.icd" | head -n 1)
          echo "Found pocl.icd at: $POCL_ICD_FILE"
          
          if [ -z "$POCL_ICD_FILE" ]; then
            echo "pocl.icd not found, searching for libpocl.dylib..."
            LIBPOCL=$(find $(brew --prefix pocl) -name "libpocl.dylib" | head -n 1)
            if [ -n "$LIBPOCL" ]; then
              echo "Found libpocl at: $LIBPOCL"
              mkdir -p ./icd_vendors
              echo "$LIBPOCL" > ./icd_vendors/pocl.icd
              POCL_ICD_DIR="$(pwd)/icd_vendors"
            fi
          else
            POCL_ICD_DIR=$(dirname "$POCL_ICD_FILE")
          fi
          
          if [ -n "$POCL_ICD_DIR" ]; then
            echo "OCL_ICD_VENDORS=$POCL_ICD_DIR" >> $GITHUB_ENV
            export OCL_ICD_VENDORS="$POCL_ICD_DIR"
            echo "Testing with clinfo..."
            clinfo || true
          fi

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.4
        env:
          CIBW_BUILD: cp312-*
          CIBW_ENVIRONMENT_MACOS: >
            MESON_ARGS="-Denable_avs=false -Dstatic=true"
            PKG_CONFIG_PATH="${{ github.workspace }}/vcpkg_installed/${{ matrix.arch == 'macosx_arm64' && 'arm64' || 'x64' }}-osx/lib/pkgconfig:/opt/homebrew/lib/pkgconfig:/usr/local/lib/pkgconfig"
            BOOST_ROOT="${{ github.workspace }}/vcpkg_installed/${{ matrix.arch == 'macosx_arm64' && 'arm64' || 'x64' }}-osx"
            MACOSX_DEPLOYMENT_TARGET=15
            OCL_ICD_VENDORS="$OCL_ICD_VENDORS"

      - name: Install and run tests
        run: |
          uv sync --no-install-project
          wheel=$(ls ./wheelhouse/*.whl | head -1)
          uv pip install "$wheel"
          uv run --no-sync pytest -v tests

      - name: Upload VapourSynth plugin
        uses: actions/upload-artifact@v7
        with:
          name: knlmeanscl-vs-macos-${{ matrix.arch }}
          path: ./wheelhouse/*.whl
