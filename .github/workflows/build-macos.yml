name: Build for macOS

on:
  workflow_call:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: macosx_x86_64
            runs-on: macos-15-intel
          - arch: macosx_arm64
            runs-on: macos-15
    runs-on: ${{ matrix.runs-on }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup uv
        uses: astral-sh/setup-uv@v8.0.0

      - name: Cache vcpkg packages
        uses: actions/cache@v5
        with:
          path: |
            vcpkg_installed
          key: ${{ runner.os }}-vcpkg-${{ matrix.arch }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: ${{ runner.os }}-vcpkg-${{ matrix.arch }}-

      - name: Install vcpkg packages
        run: |
          vcpkg install \
            --triplet ${{ matrix.arch == 'macosx_arm64' && 'arm64' || 'x64' }}-osx \
            --x-install-root=vcpkg_installed
        env:
          VCPKG_ROOT: /usr/local/share/vcpkg

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.4
        env:
          CIBW_BUILD: cp312-*
          CIBW_BUILD_FRONTEND: uv
          CIBW_ENVIRONMENT_MACOS: >
            MESON_ARGS="-Denable_avs=false -Dstatic=true"
            PKG_CONFIG_PATH="${{ github.workspace }}/vcpkg_installed/${{ matrix.arch == 'macosx_arm64' && 'arm64' || 'x64' }}-osx/lib/pkgconfig"
            BOOST_ROOT="${{ github.workspace }}/vcpkg_installed/${{ matrix.arch == 'macosx_arm64' && 'arm64' || 'x64' }}-osx"
            MACOSX_DEPLOYMENT_TARGET=15
        with:
          extras: uv

      - name: Upload VapourSynth plugin
        uses: actions/upload-artifact@v7
        with:
          name: knlmeanscl-vs-macos-${{ matrix.arch }}
          path: ./wheelhouse/*.whl
